<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <title>Logistics</title>
  <link rel="stylesheet" href="__base.css" />
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; padding: 16px; }
    .kpis { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 14px; }
    .kpi { border: 1px solid rgba(127,127,127,.25); border-radius: 10px; padding: 10px 14px; min-width: 110px; }
    .kpi .label { font-size: 11px; opacity: .6; text-transform: uppercase; letter-spacing: .04em; }
    .kpi .value { font-size: 22px; font-weight: 600; margin-top: 2px; }
    h3 { margin: 18px 0 8px; font-size: 14px; }
    .controls { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
    select, input { padding: 6px 8px; border: 1px solid rgba(127,127,127,.35); border-radius: 8px; background: transparent; color: inherit; font: inherit; }
    input { flex: 1; min-width: 160px; }
    .table-wrap { overflow: auto; border: 1px solid rgba(127,127,127,.2); border-radius: 10px; max-height: 38vh; }
    table { border-collapse: collapse; width: 100%; font-size: 13px; }
    th, td { text-align: left; padding: 6px 10px; border-bottom: 1px solid rgba(127,127,127,.15); white-space: nowrap; }
    th { position: sticky; top: 0; background: rgba(127,127,127,.10); }
    .pill { font-size: 11px; padding: 1px 8px; border-radius: 999px; border: 1px solid rgba(127,127,127,.35); }
    .free { color: #137333; border-color: rgba(19,115,51,.4); }
    .returning { color: #a56300; border-color: rgba(165,99,0,.4); }
    .busy { color: #a50e0e; border-color: rgba(165,14,14,.4); }
    .empty { padding: 18px; opacity: .6; text-align: center; }
  </style>
</head>
<body>
  <div class="kpis">
    <div class="kpi"><div class="label">Xe rảnh</div><div class="value" id="kpi-free">-</div></div>
    <div class="kpi"><div class="label">Đang về</div><div class="value" id="kpi-returning">-</div></div>
    <div class="kpi"><div class="label">Tổng xe</div><div class="value" id="kpi-total">-</div></div>
    <div class="kpi"><div class="label">Đơn đang mở</div><div class="value" id="kpi-open">-</div></div>
  </div>

  <h3>Đội xe (DKI / DKI 2)</h3>
  <div class="controls">
    <select id="status-filter">
      <option value="">Tất cả trạng thái</option>
      <option value="free">free</option>
      <option value="returning">returning</option>
      <option value="busy">busy</option>
    </select>
    <input id="fleet-filter" type="text" placeholder="Lọc xe / tài xế / hãng..." />
  </div>
  <div class="table-wrap"><table><thead id="fleet-head"></thead><tbody id="fleet-body"></tbody></table></div>
  <div class="empty" id="fleet-empty" style="display:none">Chưa có xe trong DKI/DKI2.</div>

  <h3>Booking</h3>
  <div class="table-wrap"><table><thead id="bk-head"></thead><tbody id="bk-body"></tbody></table></div>
  <div class="empty" id="bk-empty" style="display:none">Chưa có booking nào.</div>

  <script src="__bridge.js"></script>
  <script>
  (function () {
    var fleet = [], bookings = [];
    function $(id){ return document.getElementById(id); }
    function resize(){ try { AtriaDash.resize(document.body.scrollHeight + 24); } catch(e){} }

    var FLEET_COLS = [
      ['vehicle_number','Số xe'], ['weight_class','Tải'], ['brand','Hãng'],
      ['ttdk_capacity','TTĐK'], ['status','Trạng thái'], ['driver_name','Tài xế'],
      ['phone','SĐT'], ['source','Nguồn']
    ];

    function renderFleet(){
      var q = $('fleet-filter').value.trim().toLowerCase();
      var st = $('status-filter').value;
      var rows = fleet.filter(function(v){
        if (st && (v.status||'').toLowerCase() !== st) return false;
        if (!q) return true;
        return [v.vehicle_number, v.driver_name, v.brand].join(' ').toLowerCase().indexOf(q) >= 0;
      });
      var head = $('fleet-head'), body = $('fleet-body');
      head.innerHTML = ''; body.innerHTML = '';
      $('fleet-empty').style.display = rows.length ? 'none' : 'block';
      var trh = document.createElement('tr');
      FLEET_COLS.forEach(function(c){ var th=document.createElement('th'); th.textContent=c[1]; trh.appendChild(th); });
      head.appendChild(trh);
      rows.forEach(function(v){
        var tr = document.createElement('tr');
        FLEET_COLS.forEach(function(c){
          var td = document.createElement('td');
          if (c[0] === 'status'){
            var s = (v.status||'').toLowerCase();
            var span = document.createElement('span');
            span.className = 'pill ' + s; span.textContent = v.status || '';
            td.appendChild(span);
          } else { td.textContent = v[c[0]] == null ? '' : v[c[0]]; }
          tr.appendChild(td);
        });
        body.appendChild(tr);
      });
      resize();
    }

    function renderBookings(){
      var head = $('bk-head'), body = $('bk-body');
      head.innerHTML = ''; body.innerHTML = '';
      $('bk-empty').style.display = bookings.length ? 'none' : 'block';
      var cols = ['Mã','Khách','Điểm đến','Tải (T)','Trạng thái','Xe / Tài xế'];
      var trh = document.createElement('tr');
      cols.forEach(function(c){ var th=document.createElement('th'); th.textContent=c; trh.appendChild(th); });
      head.appendChild(trh);
      bookings.forEach(function(b){
        var tr = document.createElement('tr');
        var trucks = (b.trucks||[]).map(function(t){ return t.vehicle_number+' / '+t.driver_name+' @'+(t.delivery_time||'?'); }).join('; ') || '(chưa gán xe)';
        [b.booking_id, b.customer, b.destination_zone, b.requested_weight_t, b.status, trucks].forEach(function(val){
          var td = document.createElement('td'); td.textContent = val == null ? '' : val; tr.appendChild(td);
        });
        body.appendChild(tr);
      });
      resize();
    }

    function refresh(){
      var p1 = AtriaDash.json('fleet.py', ['list','--json']).then(function(res){
        fleet = (res && res.vehicles) || [];
        $('kpi-free').textContent = String(fleet.filter(function(v){return (v.status||'').toLowerCase()==='free';}).length);
        $('kpi-returning').textContent = String(fleet.filter(function(v){return (v.status||'').toLowerCase()==='returning';}).length);
        $('kpi-total').textContent = String(fleet.length);
        renderFleet();
      }).catch(function(){ fleet=[]; renderFleet(); });

      var p2 = AtriaDash.json('bookings.py', ['list','--json']).then(function(res){
        bookings = (res && res.bookings) || [];
        var open = bookings.filter(function(b){ return (b.status||'').toLowerCase() !== 'done'; }).length;
        $('kpi-open').textContent = String(open);
        try { AtriaDash.setBadge(open || null); } catch(e){}
        renderBookings();
      }).catch(function(){ bookings=[]; renderBookings(); });

      return Promise.all([p1, p2]);
    }

    $('fleet-filter').addEventListener('input', renderFleet);
    $('status-filter').addEventListener('change', renderFleet);

    if (window.AtriaDash){
      AtriaDash.ready();
      AtriaDash.onChange(function(){ refresh(); });
      AtriaDash.onVisibility(function(v){ if(v) resize(); });
    }
    refresh();
  })();
  </script>
</body>
</html>
